services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: connectoffice
      POSTGRES_PASSWORD: connectoffice
      POSTGRES_DB: connect_office
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connectoffice -d connect_office"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

  migrate:
    image: golang:1.24-alpine
    working_dir: /app
    command: sh -c "go run ./cmd/migrate"
    environment:
      DATABASE_URL: postgres://connectoffice:connectoffice@postgres:5432/connect_office?sslmode=disable
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  static-files:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html:ro

volumes:
  postgres_data:

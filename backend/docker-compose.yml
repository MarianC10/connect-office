services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: connectoffice
      POSTGRES_PASSWORD: connectoffice
      POSTGRES_DB: connect_office
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
